<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
                body {
                background-color: #130d0c;
                }
                * {
                padding: 0;
                margin: 0;
                box-sizing: border-box;
                font-family: "Outfit", sans-serif;
                font-optical-sizing: auto;
                }
                .container{
                box-shadow: 0 0 14px black;
                position: absolute;
                top:50%;
                left:50%;
                transform: translate(-50%,-50%);
                width: 414px;
                height: 770px;
                border-radius: 10px;
                background: linear-gradient(180deg,rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 1) 30%,rgba(156, 25, 0, 1) 80%);
                padding: 22px 18px;
                }

                .container .nav {
                display: flex;
                margin-top: 30px;
                align-items: center;
                justify-content: space-between;
                }
                .container .nav i {
                background: none;
                font-size: 20px;
                color: #e3dedc;
                }

                .container .disco {
                background-image: url('https://static.vecteezy.com/system/resources/thumbnails/009/314/864/small/vinyl-record-vector-illustration-isolated-on-white-background-free-png.png');
                background-size: cover;
                width: 300px;
                height: 300px;
                border-radius: 50%;
                position: relative;
                top:10%;
                display: flex;
                margin: 0 auto;
                box-shadow: 0 0 50px #181311;
                box-shadow: 0 0 25px #130101;

                animation-name: spin;
                animation-duration: 2000ms;
                animation-iteration-count: infinite;
                animation-timing-function: linear;
                }

                            @keyframes spin { 
                    from { 
                        transform: rotate(0deg); 
                    } to { 
                        transform: rotate(360deg); 
                    }
                }

                /* From Uiverse.io by ParasSalunke */
                .music-card {
                width: 100%;
                margin: 150px auto;
                position: relative;
                background-color: none;
                overflow: hidden;
                transition: transform 0.3s ease;
                }

                .card-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background-color: none;
                }

                .track-info {
                display: flex;
                align-items: center;
                }

                .track-icon {
                height: 24px;
                width: 24px;
                color: #fa8a20;
                }

                .track-details {
                margin-left: 12px;
                }

                .track-title {
                font-size: 1.5rem;
                font-weight: 600;
                color: #e3dedc;
                }

                .track-artist {
                font-size: 0.9rem;
                color: #917b76;
                }

                .card-icons {
                display: flex;
                align-items: center;
                }

                .icon-heart {
                height: 24px;
                width: 24px;
                color: #ef4444;
                cursor: pointer;
                }

                .icon-star {
                height: 24px;
                width: 24px;
                color: #e3dedc;
                margin-left: 16px;
                cursor: pointer;
                }
                .progress-container {
                position: relative;
                margin: 16px 16px 8px 16px;
                background:none;
                border-radius: 3px;
                overflow: hidden;
              }
              .progress-bar{
                width: 100%;
                height: 4px;
                background-color: white;
              }
              .bar{
                width: 23%;
                height: 4px;
                background-color: #fa8a20;
              }
              .progress-time {
                display: flex;
                justify-content: space-between;
                padding: 0 16px 16px 16px;
                font-size: 0.85rem;
                color: #917b76;
                margin-top: 20px;
              }
              .heart {
                position: absolute;
                top:50%;
                left:50%;
                transform: translate(-50%,-50%);
                width: 414px;
                height: 770px;
                border-radius: 10px;
                background-image: url('https://www.onlygfx.com/wp-content/uploads/2019/06/6-heart-pattern-2.png');
                background-size: contain;
                z-index: -1;
                opacity: 20%;
                overflow: hidden;
                background-repeat: repeat-y;
                transition: ease-in-out;

                animation: roll 3600s infinite linear
              }
                @keyframes roll { 
                  100% {
                    background-position-y: 200000px;
                  }
                }

              .gradient {
                background-image: linear-gradient(179deg,rgba(0, 0, 0, 1) 0%, rgba(156, 25, 0, 0) 100%);
                position: absolute;
                top:50%;
                left:50%;
                transform: translate(-50%,-50%);
                width: 414px;
                height: 770px;
                z-index: -1;
                border-radius: 12px;
              }

                
    </style>

<div class="container">
  <div class="nav">
    <i class="	fa fa-angle-left"></i>
      <h5 style="color:#e3dedc; font-weight:400;">Tocando agora</h5>
    <i class="	fa fa-ellipsis-v"></i></div>
  <div class="disco" id="disco"></div>
  <div class="pedido"></div>
  <div class="respostas"></div>
  <div class="player">
<div class="music-card">

  <div class="card-header">
    <div class="track-info">
      <svg
        class="track-icon"
        fill="none"
        height="24"

        stroke-linejoin="round"

        xmlns="http://www.w3.org/2000/svg"
      >
        <path d="M9 18V5l12-2v13"></path>
        <circle cx="6" cy="18" r="3"></circle>
        <circle cx="18" cy="16" r="3"></circle>
      </svg>
      <div class="track-details">
        <span class="track-title">Quer namorar comigo?</span>
        <p class="track-artist">Jennyfer Kaliane Gomes</p>
      </div>
    </div>
    <div class="card-icons">
      <svg
        class="icon-heart"
        fill="currentColor"

        width="24"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"
        ></path>

      <svg

      >
        <polygon
          points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
        ></polygon>
      </svg>
    </div>
  </div>
    <div class="progress-container"><div class="progress-bar"><div class="bar"></div></div></div>
    <div class="progress-time"><span style="font-weight: 700; color: aliceblue;">SIM</span><span>NÃO</span></div>

</div>

</body>
